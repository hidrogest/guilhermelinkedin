  <style>

      0%, 100% { box-shadow: 0 4px 20px rgba(10, 102, 194, 0.05); }
      50% { box-shadow: 0 4px 25px rgba(10, 102, 194, 0.15); }
    }

      animation: subtle-glow 4s ease-in-out infinite; 
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#f0f4f8] via-[#e8f0fe] to-[#f0f4f8] min-h-screen text-slate-800">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const CheckCircle2 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const MapPin = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
    const Mail = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
    const Phone = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
    const ChevronRight = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
    const Info = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
    const ShieldCheck = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/><path d="m9 12 2 2 4-4"/></svg>;
    const XCircle = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>;
    const DownloadIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
    const CopyIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
    const XIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
    const ArrowLeft = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
    const Lock = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
    const Globe = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>;
    const Clock = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;

    const CopyInlineButton = ({ text, label = "Copiar", onCopy }) => (
      <button
        onClick={(e) => { e.stopPropagation(); onCopy(text); }}
        className="flex items-center justify-center gap-1.5 px-3 py-1.5 bg-gradient-to-r from-[#0a66c2] to-[#084e96] hover:from-[#084e96] hover:to-[#063970] text-white text-[11px] uppercase tracking-wider font-bold rounded-full transition-all shadow-[0_4px_10px_rgba(10,102,194,0.3)] hover:shadow-[0_6px_15px_rgba(10,102,194,0.4)] hover:-translate-y-0.5 active:scale-95 shrink-0"
        title={`Copiar ${label.toLowerCase()}`}
      >
        <CopyIcon size={14} /> {label}
      </button>
    );

    const Highlight = ({ condition, isFixed, label, description, children, block = false, hideFixedBorder = false, position = 'inline', customIcon = null }) => {
      const [isDismissed, setIsDismissed] = useState(false);

      useEffect(() => {
        setIsDismissed(false);
      }, [isFixed]);

      if (!condition) return <>{children}</>;

      const baseStyles = block ? 'block w-full' : 'inline-block';
      const fixedStyles = hideFixedBorder 
        ? 'border-transparent bg-transparent'
        : 'border-green-400 bg-green-50/30 shadow-[0_0_15px_rgba(74,222,128,0.15)]';
      
      const warningStyles = 'border-orange-300 bg-orange-50/40';
      const isOverlay = position.startsWith('overlay');
      const showBalloon = description && !isDismissed;

      return (
        <div className={`relative ${baseStyles} ${isOverlay ? '' : (showBalloon ? 'mb-3' : '')}`}>
          <div className={`
            ${baseStyles} 
            transition-all duration-700 ease-in-out
            ${!isDismissed ? `border-2 border-dashed rounded-xl p-1 -m-1 ${isFixed ? fixedStyles : warningStyles}` : ''}
          `}>
            {children}
          </div>
          
          {showBalloon && (
            <div className={`
              ${isOverlay ? 'absolute z-40 shadow-xl backdrop-blur-md' : 'relative mt-3 shadow-md hover:shadow-lg'}
              ${position === 'overlay-top-left' ? 'top-2 left-2 sm:top-4 sm:left-4 w-[calc(100%-50px)] sm:w-auto sm:max-w-[280px]' : ''}
              ${position === 'overlay-avatar-tooltip' ? 'top-[105%] left-1/2 -translate-x-1/2 sm:top-2 sm:translate-x-0 sm:left-[110%] sm:ml-2 w-52 sm:w-[260px]' : ''}
              ${!isOverlay ? 'w-full max-w-xl' : ''}
              p-2.5 sm:p-3 rounded-xl text-left border transition-all duration-500
              ${isFixed ? 'bg-gradient-to-br from-green-50 to-emerald-50/90 border-green-200 text-green-900' : 'bg-gradient-to-br from-[#FFF9F2] to-orange-50/90 border-orange-200 text-orange-900'}
            `}>
              
              <button 
                onClick={(e) => { e.preventDefault(); e.stopPropagation(); setIsDismissed(true); }}
                className={`absolute top-1.5 right-1.5 p-1 rounded-full hover:bg-black/5 transition-colors z-50 ${isFixed ? 'text-green-700/50 hover:text-green-800' : 'text-orange-700/50 hover:text-orange-800'}`}
                title="Fechar dica"
              >
                <XIcon size={14} />
              </button>

              {!isOverlay && (
                <div className={`absolute -top-2 left-6 w-4 h-4 rotate-45 border-l border-t
                  ${isFixed ? 'bg-green-50 border-green-200' : 'bg-[#FFF9F2] border-orange-200'}
                `}></div>
              )}

              {position === 'overlay-avatar-tooltip' && (
                <div className={`absolute -top-1.5 left-1/2 -translate-x-1/2 sm:top-6 sm:-left-1.5 sm:translate-x-0 w-3 h-3 rotate-45 border-l border-t sm:border-t-0 sm:border-b
                  ${isFixed ? 'bg-green-50 border-green-200' : 'bg-[#FFF9F2] border-orange-200'}
                `}></div>
              )}

              <div className="relative z-10 flex items-start gap-2 pr-5">
                <div className="mt-0.5 shrink-0">
                  {customIcon ? customIcon : (isFixed ? <CheckCircle2 size={16} className="text-green-600" /> : <Info size={16} className="text-orange-500" />)}
                </div>
                <div>
                  <strong className={`block mb-0.5 text-[10px] sm:text-[11px] uppercase tracking-wider font-bold ${isFixed ? 'text-green-700' : 'text-orange-700'}`}>
                    {label}
                  </strong>
                  <span className="text-[12px] sm:text-[13px] leading-snug opacity-90 block">
                    {description}
                  </span>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    function App() {
      const [isOptimized, setIsOptimized] = useState(false);
      const [animateProgress, setAnimateProgress] = useState(false);
      const [showCopyModal, setShowCopyModal] = useState(false);
      const [toastMsg, setToastMsg] = useState("");

      // --- DADOS DO GUILHERME ---
      const photoUrl = "https://drive.google.com/thumbnail?id=1MXqmEpY_Da2xxosAn5wNPPxYEyxIUKiB&sz=w800";
      const fallbackAvatar = "https://ui-avatars.com/api/?name=Guilherme+Moura&size=200&background=0a66c2&color=fff";
      
      const bgBefore = "https://placehold.co/1200x360/e2e8f0/64748b?text=Sem+imagem+de+capa";
      const bgAfter = "https://drive.google.com/thumbnail?id=1b5qaQnqW599PFJJlzXHKuGF5-0z-m-KF&sz=w1200";
      const bgAfterDownload = "https://drive.google.com/uc?export=download&id=1b5qaQnqW599PFJJlzXHKuGF5-0z-m-KF";

      const logoHidrogest = "https://drive.google.com/thumbnail?id=1aWt-ZBZIvBdviJ3hoYVExMUoQlFEt15O&sz=w200";
      const logoIETAAM = "https://ui-avatars.com/api/?name=IETAAM&size=200&background=0f766e&color=fff";

      useEffect(() => {
        setAnimateProgress(false);
        const timer = setTimeout(() => setAnimateProgress(true), 100);
        return () => clearTimeout(timer);
      }, [isOptimized]);

      const handleCopyText = (text) => {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.top = "0";
        textArea.style.left = "0";
        textArea.style.position = "fixed";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
          document.execCommand('copy');
          setToastMsg("Prontinho! Texto copiado.");
        } catch (err) {
          setToastMsg("Ops, não consegui copiar.");
        }
        document.body.removeChild(textArea);
        setTimeout(() => setToastMsg(""), 3000);
      };

      const copyTexts = {
        nome: "Guilherme Moura Costa Gomes",
        titulo: "Técnico Hidrometrista Pleno & Marinheiro Fluvial | Técnico em Meio Ambiente | ADCP & Telemetria",
        sobre: "Sou Técnico em Meio Ambiente e atuo como Técnico Hidrometrista Pleno, com forte vivência prática em monitoramento hidrossedimentológico e gestão de recursos hídricos.\n\nIniciei minha trajetória na Hidrogest Engenharia em 2022 como Auxiliar e, através da atuação contínua nas operações de campo e controle de qualidade, alcancei a posição de Pleno. Esse processo me proporcionou uma visão completa e aprofundada de todas as etapas operacionais.\n\nTenho atuado em frentes complexas e de grande relevância ambiental, realizando medições de descarga (com ADCP e molinetes) e coleta de sedimentos em projetos como o Sistema de Alerta da Fundação Renova (Mariana) e o monitoramento da Bacia do Rio Paraopeba para a Vale (Brumadinho).\n\nPossuo também certificações de Marinheiro Fluvial (CIR) e ARRAIS Amador, além de treinamentos de segurança (NR35, PSA e Direção Off-Road Padrão Vale), o que me permite conduzir embarcações e executar trabalhos de campo com máxima segurança e precisão.",
        experienciaHidrogest: "Evolução contínua em projetos de alta complexidade em hidrometria e recuperação ambiental.\n\n• Atuação direta no monitoramento hidrossedimentológico (medições de descarga líquida e amostragem de sedimentos) em 13 estações da bacia do rio Paraopeba e ribeirão Ferro Carvão (Vale - Brumadinho).\n• Manutenção, operação e medições de descarga nas estações do Sistema de Alerta da área impactada de Mariana (Fundação Renova) e Dique S4 (Samarco).\n• Experiência avançada na utilização de perfilador acústico Doppler (ADCP) e molinetes fluviométricos.\n• Instalação e manutenção de estações fluviométricas e sedimentométricas em redes de grande porte (CEMIG) nos estados de MG e GO.\n\nHistórico de Evolução na Hidrogest:\n- Promovido a Técnico Hidrometrista Pleno (Mar/2024)\n- Técnico Hidrometrista Júnior (Out/2023 a Fev/2024)\n- Auxiliar de Hidrometrista II (Mar/2023 a Set/2023)\n- Auxiliar de Hidrometrista I (Dez/2022 a Fev/2023)\n- Auxiliar de Hidrometrista (Fev/2022 a Nov/2022)",
        licencaCIR: "Carteira de Inscrição e Registro (CIR) emitida pela Marinha do Brasil, que me habilita como Marinheiro Fluvial Auxiliar de Convés para navegação segura em águas interiores."
      };

      const checklistItems = [
        { id: 1, text: "Tornar o Perfil Público (Desbloquear visualização)", done: isOptimized },
        { id: 2, text: "Destacar a fantástica evolução rápida para Pleno", done: isOptimized },
        { id: 3, text: "Dar visibilidade aos projetos da Vale, Samarco e Renova", done: isOptimized },
        { id: 4, text: "Adicionar as Licenças da Marinha (CIR e ARRAIS)", done: isOptimized },
        { id: 5, text: "Inclusão do Banner Oficial da Hidrogest", done: isOptimized },
      ];

      return (
        <div className="min-h-screen font-sans pb-16 selection:bg-blue-200">
          
          <div className={`fixed top-24 left-1/2 -translate-x-1/2 z-[100] transition-all duration-500 ${toastMsg ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 -translate-y-4 scale-95 pointer-events-none'}`}>
            <div className="bg-gradient-to-r from-green-600 to-emerald-700 text-white px-6 py-3 rounded-full shadow-2xl shadow-green-900/20 font-bold flex items-center gap-2 border border-green-500/50">
              <CheckCircle2 size={20} />
              {toastMsg}
            </div>
          </div>

          <div className="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-white shadow-sm">
            <div className="max-w-5xl mx-auto px-4 py-4">

              <div className="mb-4">
                <a 
                  href="https://hidrogest.github.io/hublinkedin/"
                  className="group relative inline-flex items-center justify-center self-start"
                  title="Voltar para o Hub de Auditorias"
                >
                  <span className="absolute -inset-1 bg-gradient-to-r from-[#0a66c2] via-[#34d399] to-[#0ea5e9] rounded-full blur-md opacity-40 group-hover:opacity-80 animate-pulse transition duration-500"></span>
                  <span className="relative flex items-center gap-2 px-5 py-2 bg-white/20 backdrop-blur-lg border border-white/60 rounded-full shadow-[0_4px_15px_rgba(0,0,0,0.05)] transition-all duration-300 group-hover:bg-white/40 group-hover:shadow-[0_8px_25px_rgba(0,0,0,0.1)] overflow-hidden">
                    <span className="absolute inset-x-0 top-0 h-[45%] bg-gradient-to-b from-white/70 to-transparent rounded-t-full pointer-events-none"></span>
                    <ArrowLeft size={16} className="text-[#0B3B59] group-hover:-translate-x-1 transition-transform duration-300 relative z-10" />
                    <span className="text-[13px] uppercase tracking-wider font-bold text-[#0B3B59] relative z-10">
                      Voltar pro Hub
                    </span>
                  </span>
                </a>
              </div>

              <div className="flex flex-col md:flex-row items-center justify-between gap-6">
                
                <div className="flex items-center gap-3">
                  <div className={`p-2.5 rounded-xl shadow-lg transition-colors duration-500 ${isOptimized ? 'bg-gradient-to-br from-[#0B3B59] to-[#062438] text-white shadow-[#0B3B59]/20' : 'bg-gradient-to-br from-gray-500 to-gray-700 text-white shadow-gray-500/20'}`}>
                    {isOptimized ? <Globe size={24} /> : <Lock size={24} />}
                  </div>
                  <div>
                    <h1 className="font-bold text-xl text-gray-900 leading-tight">Sugestões de Melhoria - LinkedIn</h1>
                    <p className="text-sm text-gray-500 font-medium">Colaborador: Guilherme Moura Costa Gomes</p>
                  </div>
                </div>

                <div className="flex-1 max-w-md w-full px-4">
                  <div className="flex justify-between text-sm mb-1.5 font-medium">
                    <span className="text-gray-600">Visibilidade do Perfil</span>
                    <span className={isOptimized ? "text-green-600 font-bold" : "text-gray-500 font-bold"}>
                      {isOptimized ? "Público e Otimizado (100%)" : "Privado / Oculto (10%)"}
                    </span>
                  </div>
                  <div className="h-2.5 w-full bg-gray-200/50 rounded-full overflow-hidden shadow-inner backdrop-blur-sm">
                    <div 
                      className={`h-full rounded-full transition-all duration-1000 ease-out relative ${
                        isOptimized ? "bg-gradient-to-r from-green-400 to-emerald-500 shadow-[0_0_10px_rgba(52,211,154,0.5)]" : "bg-gradient-to-r from-gray-400 to-gray-500"
                      }`}
                      style={{ width: animateProgress ? (isOptimized ? "100%" : "10%") : "0%" }}
                    >
                      <div className="absolute top-0 left-0 bottom-0 right-0 bg-white/20 animate-pulse"></div>
                    </div>
                  </div>
                </div>

                <div className="flex bg-gray-100/80 backdrop-blur-sm p-1.5 rounded-xl border border-gray-200/60 shadow-inner">
                  <button
                    onClick={() => setIsOptimized(false)}
                    className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all duration-300 ${
                      !isOptimized ? 'bg-white shadow-md text-gray-700 ring-1 ring-gray-200/50 scale-100' : 'text-gray-500 hover:text-gray-700 scale-95'
                    }`}
                  >
                    <Lock size={16} className={!isOptimized ? "animate-pulse" : ""} />
                    Perfil Atual (Privado)
                  </button>
                  <button
                    onClick={() => setIsOptimized(true)}
                    className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all duration-300 ${
                      isOptimized ? 'bg-gradient-to-r from-[#0a66c2] to-[#084e96] shadow-lg shadow-blue-900/20 text-white ring-1 ring-blue-600 scale-100' : 'text-gray-500 hover:text-gray-700 scale-95'
                    }`}
                  >
                    <Globe size={16} />
                    Desbloqueado
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div className="max-w-5xl mx-auto mt-8 px-4 grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div className="lg:col-span-1 space-y-4">
              <div className="bg-white/90 backdrop-blur-xl rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white p-5 sticky top-28">
                <h3 className="font-bold text-gray-900 mb-4 flex items-center gap-2">
                  <Info size={18} className="text-[#0a66c2]" />
                  Dicas para Você
                </h3>
                
                <ul className="space-y-3">
                  {checklistItems.map(item => (
                    <li key={item.id} className="flex items-start gap-3 transition-all duration-300">
                      <div className={`mt-0.5 rounded-full transition-colors duration-300 shadow-sm ${item.done ? 'text-green-500 bg-green-50' : 'text-gray-300 bg-gray-50'}`}>
                        <CheckCircle2 size={18} />
                      </div>
                      <span className={`text-sm ${item.done ? 'text-gray-800 font-semibold' : 'text-gray-500 font-medium'}`}>
                        {item.text}
                      </span>
                    </li>
                  ))}
                </ul>

                <div className={`mt-6 p-4 rounded-xl text-sm transition-all duration-500 shadow-sm ${
                  isOptimized ? 'bg-gradient-to-br from-green-50 to-emerald-50/50 border border-green-200/50 text-green-800' : 'bg-gradient-to-br from-gray-100 to-gray-50/50 border border-gray-200/50 text-gray-800'
                }`}>
                  <p className="font-bold mb-1">{isOptimized ? 'Seu Perfil está Brilhante!' : 'Oi Guilherme, tudo bem?'}</p>
                  <p className="leading-relaxed">
